    <link rel="stylesheet" href="index.css">

                    { "Roza": "30", "Date": "20 Mar 2026", "Sehr": "05:19 am", "Iftaar": "06:52 pm" }
                ],

                get today() {
                    const now = new Date();
                    const day = String(now.getDate()).padStart(2, '0');
                    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                    const month = monthNames[now.getMonth()];
                    const year = now.getFullYear();
                    const dateStr = `${day} ${month} ${year}`;

                    return this.timetable.find(item => item.Date === dateStr) || this.timetable[0];
                },

                init() {
                    console.log('Alpine App Initialized....');
                }
            }));
        })
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.7/dist/cdn.min.js"></script>
</head>

<script>

<body x-data="ramazanApp">
    <div class="container">
        <div class="stars">
            <template x-for="i in 50" :key="i">
                <div class="star"
                    :style="{ top: Math.random() * 90 + '%', left: Math.random() * 90 + '%', animationDelay: Math.random() * 2 + 's' }">
                </div>
            </template>
        </div>
        <div class="layout" x-show="!showCalendar">
            <svg class="moon" viewBox="0 0 100 100" fill="currentColor">
                <path
                    d="M50 10C30 10 14 26 14 46C14 66 30 82 50 82C55 82 60 81 64 79C54 74 47 64 47 52C47 40 54 30 64 25C60 13 55 10 50 10Z" />
                <circle cx="70" cy="25" r="2" opacity="0.8" />
                <circle cx="80" cy="35" r="1.5" opacity="0.6" />
                <circle cx="85" cy="50" r="2" opacity="0.7" />
                <circle cx="78" cy="65" r="1.5" opacity="0.5" />
                <circle cx="65" cy="75" r="1" opacity="0.4" />
            </svg>
            <h1>Ramazan Mubarak</h1>
            <div class="today-date" x-text="'Roza ' + today.Roza">
                Roza 8
            </div>
            <div class="today-time">
                <div class="time-card">
                    <p>Sehri time</p>
                    <p x-text="today.Sehr">05:00 AM</p>
                </div>
                <div class="time-card">
                    <p>Iftar time</p>
                    <p x-text="today.Iftaar">06:00 PM</p>
                </div>
            </div>
            <button class="btn" @click="showCalendar = true">
                View Full Calendar
            </button>
        </div>

        <div class="calendar-view" x-show="showCalendar" x-cloak>
            <div class="calendar-header">
                <h2>Ramazan Timetable</h2>
                <button class="btn-close" @click="showCalendar = false">&times;</button>
            </div>
            <div class="table-container">
                <table class="calendar-table">
                    <thead>
                        <tr>
                            <th>Roza</th>
                            <th>Date</th>
                            <th>Sehri</th>
                            <th>Iftar</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="day in timetable" :key="day.Roza">
                            <tr>
                                <td x-text="day.Roza"></td>
                                <td x-text="day.Date.split(' ')[0] + ' ' + day.Date.split(' ')[1]"></td>
                                <td x-text="day.Sehr"></td>
                                <td x-text="day.Iftaar"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
